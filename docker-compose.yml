# ────────────────────────────────────────────────────────────────────────────
# Docker Compose — оркестрация ML-сервиса с поддержкой A/B-тестирования
#
# Сервисы:
#   ml-service-v1  — контрольная модель (LogisticRegression)
#   ml-service-v2  — тестовая модель    (GradientBoostingClassifier)
#   nginx          — балансировщик нагрузки 50/50 для A/B-теста
#
# Запуск:  docker compose up --build
# API v1:  http://localhost:5001
# API v2:  http://localhost:5002
# A/B:     http://localhost:80
# ────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Контрольная модель v1 (LogisticRegression) ────────────────────────────
  ml-service-v1:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-default-service:v1
    container_name: ml-service-v1
    ports:
      - "5001:5000"          # доступен на http://localhost:5001
    environment:
      - MODEL_VERSION=v1
      - MODEL_DIR=/app/models
    volumes:
      # Монтируем папку с моделями только для чтения
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Тестовая модель v2 (GradientBoosting) ────────────────────────────────
  ml-service-v2:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-default-service:v2
    container_name: ml-service-v2
    ports:
      - "5002:5000"          # доступен на http://localhost:5002
    environment:
      - MODEL_VERSION=v2
      - MODEL_DIR=/app/models
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx: балансировщик нагрузки для A/B-теста ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ml-nginx
    ports:
      - "80:80"              # единая точка входа для A/B-теста
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ml-service-v1:
        condition: service_healthy
      ml-service-v2:
        condition: service_healthy
    restart: unless-stopped