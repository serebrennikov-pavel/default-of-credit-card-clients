# ────────────────────────────────────────────────────────────────────────────
# Конфигурация Nginx для A/B-тестирования двух версий ML-модели
# Nginx выступает балансировщиком нагрузки: равномерно распределяет трафик
# между сервисом v1 (контрольная группа) и v2 (тестовая группа) — 50/50
# ────────────────────────────────────────────────────────────────────────────

upstream ml_ab_backend {
    # round-robin по умолчанию — каждый запрос поочерёдно направляется в v1/v2
    server ml-service-v1:5000;
    server ml-service-v2:5000;
}

server {
    listen 80;
    server_name _;

    # Логирование запросов в JSON-формат для последующего анализа A/B-теста
    log_format json_log escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"duration":$request_time}';

    access_log /var/log/nginx/access.log json_log;
    error_log  /var/log/nginx/error.log warn;

    # Проксирование всех запросов в upstream-пул
    location / {
        proxy_pass         http://ml_ab_backend;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Эндпоинт /health доступен напрямую без балансировки (для мониторинга)
    location /nginx-health {
        return 200 '{"status":"nginx_ok"}';
        add_header Content-Type application/json;
    }
}